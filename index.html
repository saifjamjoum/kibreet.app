<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kibreet</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#fff7ed,#f8fafc);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.card{
  width:100%;
  max-width:520px;
  background:white;
  border-radius:28px;
  padding:42px 34px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
  border:1px solid #f1f5f9;
}

.logo{
  width:300px;
  max-width:85%;
  margin-bottom:18px;
}

.badge{
  display:inline-block;
  background:#fff1e8;
  color:#ff5b00;
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:bold;
  margin-bottom:14px;
}

.subtitle{
  color:#475569;
  font-size:16px;
  line-height:1.5;
  margin-bottom:28px;
}

.links{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.links a{
  text-decoration:none;
  background:#111827;
  color:white;
  padding:16px;
  border-radius:14px;
  font-weight:bold;
  transition:.2s;
}

.links a:hover{
  background:#ff5b00;
  transform:translateY(-2px);
}

.footer{
  margin-top:26px;
  color:#94a3b8;
  font-size:13px;
}
</style>
</head>

<body>
  <div class="card">
    <img src="logo.png" alt="Kibreet Logo" class="logo">

    <div class="badge">Official Kibreet Resources</div>

    <p class="subtitle">
      Access our privacy policy, terms of use, and support information.
    </p>

    <div class="links">
      <a href="privacy/">Privacy Policy</a>
      <a href="terms/">Terms of Use</a>
      <a href="support/">Support</a>
    </div>

    <div class="footer">© 2026 Kibreet. All rights reserved.</div>
  </div>
</body>
</html>
</body>
</html>
