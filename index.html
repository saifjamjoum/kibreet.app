<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kibreet</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8fafc;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:700px;
    text-align:center;
    padding:20px;
}

.card{
    background:white;
    padding:50px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
    width:400px;
    max-width:90%;
    margin-bottom:25px;
}

.subtitle{
    color:#64748b;
    margin-bottom:35px;
    font-size:18px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.links a{
    text-decoration:none;
    background:#ff5b00;
    color:white;
    padding:16px;
    border-radius:12px;
    font-weight:bold;
    transition:.2s;
}

.links a:hover{
    background:#e65000;
    transform:translateY(-2px);
}

.footer{
    margin-top:25px;
    color:#94a3b8;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<img src="logo.png" alt="Kibreet Logo" class="logo">

<p class="subtitle">
Official Legal, Privacy and Support Resources
</p>

<div class="links">
<a href="privacy/">Privacy Policy</a>
<a href="terms/">Terms of Use</a>
<a href="support/">Support</a>
</div>

<div class="footer">
© 2026 Kibreet
</div>

</div>

</div>

</body>
</html>
